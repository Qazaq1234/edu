<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EdukZ Owner Portal</title>
  <style>
    :root{
      --bg:#eef2ff; --card:#fff; --line:#e6ebf2; --text:#111827; --muted:#6b7280;
      --brand:#2563eb; --brand2:#4f46e5; --ok:#16a34a; --danger:#dc2626; --shadow:0 14px 40px rgba(17,24,39,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);color:var(--text)}
    .wrap{max-width:1220px;margin:26px auto;padding:0 16px}
    .card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
    .hero{background:linear-gradient(135deg,#0f172a,#312e81);color:#fff}
    .hero h1{font-size:48px;margin:0 0 10px}
    .hero p{margin:0;color:#ddd6fe;font-size:18px}
    .grid{display:grid;gap:16px}
    .g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .input,.select,.btn{padding:12px 14px;border-radius:14px;font:inherit}
    .input,.select{width:100%;border:1px solid #d1d5db;background:#fff}
    .btn{border:none;cursor:pointer;font-weight:800}
    .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
    .btn.ok{background:var(--ok);color:#fff}
    .btn.danger{background:var(--danger);color:#fff}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left}
    th{font-size:12px;text-transform:uppercase;color:var(--muted);background:#fafcff}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;font-size:12px;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card hero">
      <h1>EdukZ Owner</h1>
      <p>Орталықтарды бақылау, тариф беру, доступ ашу және жабу үшін platform owner панелі.</p>
    </div>

    <div class="card">
      <div class="grid g3">
        <div><input class="input" placeholder="Іздеу" /></div>
        <div><select class="select"><option>Тариф фильтрі</option><option>Эконом</option><option>Стандарт</option><option>Про</option><option>Онлайн</option></select></div>
        <div><select class="select"><option>Статус фильтрі</option><option>Ашық</option><option>Жабық</option><option>Demo</option></select></div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:24px;font-weight:900;margin-bottom:12px">Орталықтар бақылау</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Орталық</th><th>Қала</th><th>Тариф</th><th>Статус</th><th>Demo</th><th>Әрекет</th></tr>
          </thead>
          <tbody>
            <tr><td>Demo EdukZ</td><td>Өскемен</td><td><span class="pill">Про</span></td><td>Ашық</td><td>Жоқ</td><td><button class="btn ok">Доступ ашу</button> <button class="btn danger">Жабу</button></td></tr>
            <tr><td>Bilim Hub</td><td>Алматы</td><td><span class="pill">Стандарт</span></td><td>Жабық</td><td>Иә</td><td><button class="btn ok">Доступ ашу</button> <button class="btn danger">Жабу</button></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>

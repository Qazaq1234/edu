<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="favicon.ico">
<title>EdukZ Owner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans:wght@400;500;700;800&display=swap");
:root{--bg:#f4f7fb;--card:#fff;--line:#e7ebf3;--text:#0f172a;--muted:#64748b;--brand:#2563eb;--brand2:#4f46e5;--ok:#16a34a;--warn:#d97706;--danger:#dc2626;--shadow:0 18px 45px rgba(17,24,39,.08);--radius:22px}
*{box-sizing:border-box} body{margin:0;font-family:"Inter","Noto Sans","Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);color:var(--text)}
.wrap{max-width:1260px;margin:24px auto;padding:0 16px;display:grid;gap:18px} .card,.hero{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{background:linear-gradient(135deg,#081225,#163b8c 55%,#3b82f6 100%);color:#fff;padding:30px}
.hero h1{font-size:40px;line-height:1.05;margin:0 0 10px} .hero p{margin:0;color:#dbeafe;font-size:18px;line-height:1.6}
.grid{display:grid;gap:16px} .g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))} .g4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.card{padding:20px} .input,.select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;font:inherit}
.btn{appearance:none;border:none;border-radius:14px;padding:11px 15px;font:inherit;font-weight:800;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff} .btn.secondary{background:#fff;border:1px solid var(--line)} .btn.ok{background:var(--ok);color:#fff} .btn.warn{background:var(--warn);color:#fff} .btn.danger{background:var(--danger);color:#fff}
.notice{padding:12px 14px;border-radius:16px;background:#eff6ff;color:#1d4ed8} .notice.err{background:#fee2e2;color:#991b1b}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;font-size:12px;font-weight:700}
.kpi .label{font-size:12px;text-transform:uppercase;color:var(--muted);font-weight:800} .kpi .value{font-size:30px;font-weight:900;margin-top:8px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px} table{width:100%;border-collapse:collapse;min-width:980px} th,td{padding:11px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top} th{font-size:12px;color:var(--muted);text-transform:uppercase;background:#fafcff}
.status-ok{color:var(--ok);font-weight:800} .status-danger{color:var(--danger);font-weight:800} .muted{color:var(--muted)}
@media (max-width:900px){.hero h1{font-size:34px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>EdukZ Owner Portal</h1>
    <p>Қарапайым owner панелі. Орталықтың атын, қазіргі тарифін, сұралған тарифін көресің. Қажет болса тарифті бекітесің, доступ ашасың не жабасың.</p>
  </div>

  <div id="topNotice" class="notice" style="display:none"></div>

  <div class="grid g4">
    <div class="card kpi"><div class="label">Орталық</div><div class="value" id="kpiCenters">0</div></div>
    <div class="card kpi"><div class="label">Ашық</div><div class="value" id="kpiOpen">0</div></div>
    <div class="card kpi"><div class="label">Жабық</div><div class="value" id="kpiClosed">0</div></div>
    <div class="card kpi"><div class="label">Сұраныс бар</div><div class="value" id="kpiRequested">0</div></div>
  </div>

  <div class="card">
    <div class="grid g2">
      <input id="searchInput" class="input" placeholder="Іздеу: орталық, қала, тариф" oninput="renderTenants()">
      <div class="grid g2" style="gap:12px">
        <select id="filterStatus" class="select" onchange="renderTenants()">
          <option value="">Барлық статус</option>
          <option value="active">Ашық</option>
          <option value="pending">Pending</option>
          <option value="blocked">Жабық</option>
        </select>
        <select id="filterRequest" class="select" onchange="renderTenants()">
          <option value="">Барлық сұраныс</option>
          <option value="requested">Сұралған</option>
          <option value="approved">Бекітілген</option>
          <option value="none">Жоқ</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:24px;font-weight:900;margin-bottom:12px">Орталықтар</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Орталық</th>
            <th>Қала</th>
            <th>Белсенді тариф</th>
            <th>Сұралған тариф</th>
            <th>Owner статус</th>
            <th>Online</th>
            <th>Әрекет</th>
          </tr>
        </thead>
        <tbody id="tenantRows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://vlcnhytqhhikznddryzt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsY25oeXRxaGhpa3puZGRyeXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjY0MzcsImV4cCI6MjA5MDEwMjQzN30.U0twGnjxKm0ja5c2P8p-NoePH_hq9Rsq8xqbRh4l9EM";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let tenants=[],subscriptions=[],controls=[];
function notice(msg,type='ok'){const el=document.getElementById('topNotice');el.textContent=msg;el.className='notice '+type;el.style.display='block';setTimeout(()=>el.style.display='none',2600)}
function subForTenant(id){return subscriptions.find(x=>x.tenant_id===id)||null}
function ctrlForTenant(id){return controls.find(x=>x.tenant_id===id)||null}

async function loadData(){
  const [tRes,sRes,cRes] = await Promise.all([
    sb.from('tenants').select('*').order('created_at',{ascending:false}),
    sb.from('subscriptions').select('*').order('created_at',{ascending:false}),
    sb.from('owner_controls').select('*').order('opened_at',{ascending:false})
  ]);
  tenants=tRes.data||[]; subscriptions=sRes.data||[]; controls=cRes.data||[];
  renderKpis(); renderTenants();
}

function renderKpis(){
  document.getElementById('kpiCenters').textContent=tenants.length;
  document.getElementById('kpiOpen').textContent=tenants.filter(x=>x.status==='active').length;
  document.getElementById('kpiClosed').textContent=tenants.filter(x=>x.status==='blocked').length;
  document.getElementById('kpiRequested').textContent=subscriptions.filter(x=>(x.request_status||'none')==='requested').length;
}

function renderTenants(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const statusFilter=document.getElementById('filterStatus').value;
  const requestFilter=document.getElementById('filterRequest').value;
  const rows=tenants.filter(t=>{
    const s=subForTenant(t.id);
    const req=s?.request_status||'none';
    return [t.name,t.city,t.tariff_code,s?.requested_tariff||'',req].join(' ').toLowerCase().includes(q)
      && (!statusFilter || t.status===statusFilter)
      && (!requestFilter || req===requestFilter);
  });
  document.getElementById('tenantRows').innerHTML = rows.map(t=>{
    const s=subForTenant(t.id)||{};
    const c=ctrlForTenant(t.id)||{opened:false};
    const reqTariff=s.requested_tariff||t.tariff_code||'econom';
    const reqStatus=s.request_status||'none';
    return `<tr>
      <td><strong>${esc(t.name)}</strong><div class="muted" style="margin-top:4px">${esc(t.direction||'')}</div></td>
      <td>${esc(t.city||'')}</td>
      <td><span class="pill">${esc(s.tariff_code||t.tariff_code||'econom')}</span></td>
      <td><span class="pill">${esc(reqTariff)}</span><div class="muted" style="margin-top:6px">status: ${esc(reqStatus)}</div></td>
      <td>${c.opened ? '<span class="status-ok">Ашық</span>' : '<span class="status-danger">Жабық</span>'}</td>
      <td>${t.online_enabled ? 'Қосулы' : 'Өшірулі'}</td>
      <td>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn primary" onclick="approveTariff('${t.id}')">Тарифті бекіту</button>
          <button class="btn ok" onclick="openCenter('${t.id}')">Ашу</button>
          <button class="btn danger" onclick="closeCenter('${t.id}')">Жабу</button>
          <button class="btn secondary" onclick="toggleOnline('${t.id}', ${!t.online_enabled})">${t.online_enabled ? 'Online өшіру' : 'Online қосу'}</button>
        </div>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="7">Орталық жоқ</td></tr>';
}

async function approveTariff(tenantId){
  const s=subForTenant(tenantId);
  const requested=s?.requested_tariff || s?.tariff_code || 'econom';
  if(s){
    const res = await sb.from('subscriptions').update({
      tariff_code: requested,
      request_status: 'approved',
      read_only_demo: false,
      updated_at: new Date().toISOString()
    }).eq('id', s.id);
    if(res.error) return notice(res.error.message,'err');
  } else {
    const res = await sb.from('subscriptions').insert({
      tenant_id: tenantId,
      tariff_code: requested,
      requested_tariff: requested,
      request_status: 'approved',
      status: 'active',
      read_only_demo: false
    });
    if(res.error) return notice(res.error.message,'err');
  }
  const up = await sb.from('tenants').update({
    tariff_code: requested,
    tariff_mode: requested,
    demo_enabled: false,
    updated_at: new Date().toISOString()
  }).eq('id', tenantId);
  if(up.error) return notice(up.error.message,'err');
  await loadData();
  notice('Тариф бекітілді');
}

async function ensureOwnerControl(tenantId, opened){
  const c = ctrlForTenant(tenantId);
  if(c){
    return sb.from('owner_controls').update({
      opened,
      opened_at: opened ? new Date().toISOString() : c.opened_at,
      note: opened ? 'Owner ашты' : 'Owner жапты'
    }).eq('id', c.id);
  }
  return sb.from('owner_controls').insert({
    tenant_id: tenantId,
    opened,
    opened_at: opened ? new Date().toISOString() : null,
    note: opened ? 'Owner ашты' : 'Owner жапты'
  });
}

async function openCenter(tenantId){
  const t = await sb.from('tenants').update({status:'active',updated_at:new Date().toISOString()}).eq('id',tenantId);
  if(t.error) return notice(t.error.message,'err');
  const c = await ensureOwnerControl(tenantId,true);
  if(c.error) return notice(c.error.message,'err');
  await loadData();
  notice('Орталыққа доступ ашылды');
}

async function closeCenter(tenantId){
  const t = await sb.from('tenants').update({status:'blocked',updated_at:new Date().toISOString()}).eq('id',tenantId);
  if(t.error) return notice(t.error.message,'err');
  const c = await ensureOwnerControl(tenantId,false);
  if(c.error) return notice(c.error.message,'err');
  await loadData();
  notice('Орталыққа доступ жабылды');
}

async function toggleOnline(tenantId, enabled){
  const res = await sb.from('tenants').update({online_enabled:enabled,updated_at:new Date().toISOString()}).eq('id',tenantId);
  if(res.error) return notice(res.error.message,'err');
  await loadData();
  notice(enabled ? 'Online қосылды' : 'Online өшірілді');
}

loadData();
</script>
</body>
</html>

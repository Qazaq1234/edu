<!doctype html><html lang="kk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Edukz Owner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="edukz_config.example.js"></script>
<style>body{margin:0;font-family:Inter,Arial,sans-serif;background:#f4f7fb;color:#112}.wrap{max-width:1200px;margin:0 auto;padding:18px}.card{background:#fff;border:1px solid #dde6f0;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 6px 24px rgba(15,23,42,.05)}input,button,select{font:inherit}input,select{width:100%;padding:11px 12px;border:1px solid #dbe4ef;border-radius:12px}.btn{background:#245cff;color:#fff;border:0;padding:11px 14px;border-radius:12px}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #e6edf5;text-align:left} .row{display:flex;gap:10px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><h1>Орталықтар бақылау</h1><div class="row"><input id="owner-secret" placeholder="Owner secret"><button class="btn" id="load-btn">Жүктеу</button><input id="search" placeholder="Іздеу"></div></div><div id="content"></div></div>
<script>
const {createClient}=supabase; const cfg=window.EDUKZ_CONFIG||{}; const sb=createClient(cfg.supabaseUrl,cfg.supabaseAnonKey); let loaded=false; const qs=i=>document.getElementById(i);
function money(v){return new Intl.NumberFormat('kk-KZ').format(Number(v||0))+' ₸';}
async function load(){ if(qs('owner-secret').value!==cfg.ownerSecret){ alert('Owner secret қате'); return;} loaded=true; render(); }
async function render(){ if(!loaded)return; const q=qs('search').value?.trim().toLowerCase()||''; const [{data:centers},{data:reqs},{data:tariffs}] = await Promise.all([sb.from('centers').select('*').order('created_at',{ascending:false}),sb.from('owner_requests').select('*').order('created_at',{ascending:false}),sb.from('tariffs').select('*')]); const tariffMap=Object.fromEntries((tariffs||[]).map(t=>[t.code,t])); const list=(centers||[]).filter(c=>!q || c.center_name.toLowerCase().includes(q) || (c.city||'').toLowerCase().includes(q)); qs('content').innerHTML=`<div class="card"><table><tr><th>Орталық</th><th>Қала</th><th>Тариф</th><th>Статус</th><th>Сұраныстар</th><th>Әрекет</th></tr>${list.map(c=>{const r=(reqs||[]).filter(x=>x.center_id===c.id)[0]; return `<tr><td>${c.center_name}</td><td>${c.city||''}</td><td><select onchange="changeTariff('${c.id}',this.value)">${Object.keys(tariffMap).map(code=>`<option ${c.tariff_code===code?'selected':''} value="${code}">${tariffMap[code].title}</option>`).join('')}</select></td><td>${c.tariff_status}</td><td>${r?`${r.requested_tariff} / ${r.request_status}`:'-'}</td><td><button onclick="setStatus('${c.id}','active')">Доступ ашу</button> <button onclick="setStatus('${c.id}','blocked')">Жабу</button></td></tr>`}).join('')}</table></div>`; }
async function setStatus(id,status){ const res=await sb.from('centers').update({tariff_status:status}).eq('id',id); if(res.error) alert(res.error.message); else render(); }
async function changeTariff(id,code){ const res=await sb.from('centers').update({tariff_code:code}).eq('id',id); if(res.error) alert(res.error.message); else render(); }
window.setStatus=setStatus; window.changeTariff=changeTariff; qs('load-btn').onclick=load; qs('search').oninput=()=>render();
</script></body></html>
